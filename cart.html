<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Carrito - Eccomerce</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css\styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="paginaCarrito">
  <header class="headerCarrito">
  <div class="header-left">
    <a href="index.html" class="btn-volver">← Seguir comprando</a>
  </div>
  <div class="header-center">
    <h2 class="tituloCarrito">Carrito</h2>
  </div>
  <div class="header-right">
    <!-- Espacio vacío para balancear -->
  </div>
</header>

  <main>
    <section id="carrito">
      <h2>Productos en tu carrito</h2>

      <div id="cart-items"></div>

      <p id="cart-empty" class="cart-empty">
        Tu carrito está vacío 😓
      </p>

      <p id="cart-total" class="cart-total">
        Total: $0
      </p>
      <div style="display: flex; justify-content: flex-end; margin: 20px 0;"></div>
      <button id="finalizar-compra" class="btn-finalizar">
      💳 Finalizar Compra
      </button>
      </div>
      <button id="vaciar-carrito" class="btn-vaciar">
        <img src="Iconos\papelera-de-reciclaje.svg" alt="icono-papelera"/>
        <span></span>
      </button>
    </section>
  </main>


  


  <script src="./js/cart.js"></script>
</body>
</html>
