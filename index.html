<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Eccomerce</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div id="toast-container"></div>

  <!-- HEADER: AHORA CONTIENE TODO EN UNA SOLA LÍNEA -->
<header class="header-main">
  <div class="header-top">
<div class="search-wrapper">
  <select id="filtro-categoria" class="select-oculto">
    <option value="todos">Todos</option>
    <option value="remeras">Remeras</option>
    <option value="pantalones">Pantalones</option>
    <option value="zapatillas">Zapatillas</option>
    <option value="camisas">Camisas</option>
  </select>

  <button id="btn-categorias" class="icon-btn">
     <img src="Iconos/menu-puntos.svg" alt="Categorías" width="24">
  </button>

  <button id="btn-toggle-search" class="icon-btn">
    <img src="Iconos/busqueda.svg" alt="Buscar" width="24">
  </button>
  <input type="text" id="busqueda" class="input-expandable" placeholder="Buscar...">
</div>

    <h1 class="logo-tienda">ECCOMERCE</h1>

    <a href="cart.html" class="btn-ver-carrito">
      <img src="Iconos/carrito-de-compras.svg" class="imagen_Carrito" alt="Carrito" />
      <span id="cart-count">0</span>
    </a>
  </div>
</header>

  <!-- MAIN: Contenido principal (productos) -->
  <main>
    <section id="productos-container" class="productos-container">
      <!-- Acá JS va a inyectar las tarjetas -->
    </section>
  </main>

  <!-- Siempre al final del body -->
  <script src="./js/toast.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
