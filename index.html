<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Tienda Rockera</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header>
    <h1>Tienda Rockera</h1>

    <!-- Link para abrir el carrito en otra pestaña -->
    <a href="cart.html"  class="btn-ver-carrito">
      Ver carrito
    </a>
  </header>

  <main>
    <!-- Después acá van filtros, búsqueda, etc. -->
     <section id="filtros" class="filtros">
  <select id="filtro-categoria">
    <option value="todos">Todas las categorías</option>
    <option value="remeras">Remeras</option>
    <option value="pantalones">Pantalones</option>
    <option value="zapatillas">Zapatillas</option>
  </select>

  <input
    type="text"
    id="busqueda"
    placeholder="Buscar producto..."
  />
</section>
    <section id="productos-container" class="productos-container">
      <!-- Acá JS va a inyectar las tarjetas -->
    </section>
  </main>

  <!-- Siempre al final del body -->
  <script src="./js/main.js"></script>
</body>
</html>
