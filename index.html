<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Tienda Rockera</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div id="toast-container"></div>

  <!-- HEADER: AHORA CONTIENE TODO EN UNA SOLA LÍNEA -->
  <header class="header-main">
    <!-- Contenedor para filtros y búsqueda (izquierda y centro) -->
    <div class="header-filtros-busqueda">
      <!-- FILTROS (Izquierda) -->
      <div class="filtros">
        <select id="filtro-categoria">
          <option value="todos">Todas las categorías</option>
          <option value="remeras">Remeras</option>
          <option value="pantalones">Pantalones</option>
          <option value="zapatillas">Zapatillas</option>
        </select>
      </div>

      <!-- BÚSQUEDA (Centro) -->
      <div class="busqueda">
        <input
          type="text"
          id="busqueda"
          placeholder="Buscar producto...  🔎"
        />
      </div>
    </div>

    <!-- CARRITO (Derecha) -->
    <a href="cart.html" class="btn-ver-carrito">
      <img
        src="Iconos\carrito-de-compras.svg"
        class="imagen_Carrito"
        alt="Carrito"
      /> 
      <span id="cart-count">0</span>
    </a>
  </header>

  <!-- TÍTULO PRINCIPAL (AHORA FUERA DEL HEADER, ABAJO) -->
  <h1>Eccomerce</h1>

  <!-- MAIN: Contenido principal (productos) -->
  <main>
    <section id="productos-container" class="productos-container">
      <!-- Acá JS va a inyectar las tarjetas -->
    </section>
  </main>

  <!-- Siempre al final del body -->
  <script src="./js/toast.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
